<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>📊 Trading Signals Dashboard</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
    }

    .card {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
    }

    .table {
      color: #e2e8f0;
    }

    .table thead {
      background: #1e293b;
    }

    .badge-buyCE {
      background: #22c55e;
    }

    .badge-buyPE {
      background: #ef4444;
    }

    .title {
      color: #38bdf8;
    }
  </style>
</head>

<body>

<div class="container py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="title">📊 Live Trading Signals</h2>
    <span class="badge bg-info">Auto Refresh: 3s</span>
  </div>

  <!-- Card -->
  <div class="card p-3 shadow">

    <div class="table-responsive">
      <table class="table table-hover align-middle" id="table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Type</th>
            <th>Signal</th>
            <th>Price</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>

</div>

<script>
async function load() {
  try {
    const res = await fetch("/signals");
    const data = await res.json();

    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    data.forEach(d => {
      const row = document.createElement("tr");

      // badge style
      const signalBadge = d.signal === "buyCE"
        ? `<span class="badge badge-buyCE">BUY CE</span>`
        : `<span class="badge badge-buyPE">BUY PE</span>`;

      row.innerHTML = `
        <td>${new Date(d.time).toLocaleString()}</td>
        <td>${d.type}</td>
        <td>${signalBadge}</td>
        <td>${d.price}</td>
      `;

      tbody.appendChild(row);
    });

  } catch (err) {
    console.error("Error loading data:", err);
  }
}

// initial load
load();

// auto refresh
setInterval(load, 3000);
</script>

</body>
</html>
